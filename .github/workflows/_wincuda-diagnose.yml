name: wincuda-diagnose

# TEMPORARY: reproduces the release's Windows static-CUDA build so the nvcc
# toolchain issue can be diagnosed and fixed without re-tagging a release.
# Delete this file once the fix lands in release.yml.
on:
  push:
    branches: [ci/win-cuda-diagnose]
  workflow_dispatch:

jobs:
  win-cuda:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Show default MSVC
        run: |
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Directory | Select-Object Name
      # CUDA 13.2 is the first release whose nvcc frontend supports the runner's
      # MSVC 195x (VS 2026 / toolset 14.5x). CUDA 12.5's cudafe++ segfaults on it
      # (ACCESS_VIOLATION) — the runner ships only the newest MSVC, so pinning an
      # older toolkit is not an option. v0.2.35 is the first action tag with 13.2.
      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"
          method: network
          sub-packages: '["nvcc", "cudart"]'
      - name: Build cuda-static
        run: cargo build --release --features cuda-static
