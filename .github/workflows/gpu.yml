name: GPU

# Runs the CUDA path (kernels.cu + GPU↔CPU parity) on a self-hosted runner with
# an NVIDIA GPU and the CUDA toolkit (nvcc) installed. GitHub-hosted runners have
# no GPU, so `--features cuda-kernels` tests are invisible to the normal CI.
#
# Register the runner with the `gpu` label:  ./config.sh --labels gpu
# The box must have: a working `cargo`, the CUDA toolkit on PATH (nvcc), and
# cudart on the link path.
#
# Triggers are deliberately narrow — manual dispatch plus pushes to main only.
# Never add `pull_request` here: a self-hosted runner executes PR code on your
# own hardware, so an untrusted PR could run arbitrary commands on the box.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  gpu-parity:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: nvidia-smi
        run: nvidia-smi
      - name: Build (cuda-kernels)
        run: cargo build --release --features cuda-kernels
      # gpu_parity.rs (#![cfg(feature = "cuda-kernels")]) asserts the device
      # run_block matches the CPU oracle; the rest of the suite runs too.
      - name: Test (cuda-kernels)
        run: cargo test --release --features cuda-kernels
