name: release

# Build prebuilt `dlm` binaries and attach them to the GitHub Release when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# install.sh downloads these, so users never build from source.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {} # run manually from a tag ref

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds the default (CPU) feature set — runs on any machine with no GPU
      # toolchain.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dlm
          target: ${{ matrix.target }}
          # Version-independent asset name so install.sh can use the
          # `releases/latest/download/` redirect.
          archive: dlm-$target
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  # GPU (CUDA) build — Linux x86-64 only. install.sh downloads this
  # `-cuda` asset when it detects an NVIDIA GPU. Building needs nvcc (to compile
  # src/gpu/kernels.cu) but no GPU; the binary links the CUDA runtime, so it only
  # runs on machines with the CUDA runtime + an NVIDIA driver.
  build-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.5.0"
          method: network
          sub-packages: '["nvcc", "cudart"]'
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dlm
          target: x86_64-unknown-linux-gnu
          features: cuda-kernels
          archive: dlm-$target-cuda
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  # Shell completion scripts, generated by the binary itself and attached to the
  # Release. Platform-independent (generated from the CLI definition), so one job.
  completions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          for sh in bash zsh fish elvish powershell; do
            cargo run --quiet -- completions "$sh" > "dlm.$sh"
          done
      - run: gh release upload "$GITHUB_REF_NAME" dlm.bash dlm.zsh dlm.fish dlm.elvish dlm.powershell --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
