name: release

# Build prebuilt `dlm` binaries and attach them to the GitHub Release when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# install.sh downloads these, so users never build from source.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {} # run manually from a tag ref

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so every upload job has a target. Without
  # this the uploads race — `gh release upload` doesn't create a release, and
  # parallel jobs each try to create one — which is how the first tagged run
  # failed with repeated "release not found".
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if absent
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # No Intel-Mac build: GitHub retired the macos-13 (Intel) image in Dec
          # 2025, Intel Macs can't use the CUDA path anyway, and Apple Silicon is
          # covered below. Intel-Mac users build from source (see install.sh).
          - target: aarch64-apple-darwin
            os: macos-14
          # Windows is a first-class target: `dlm` is pure std + a CPU kernel, so
          # it builds natively here. Ships as a .zip (see `zip:` below) and is
          # installed by install.ps1.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds the default (CPU) feature set — runs on any machine with no GPU
      # toolchain.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dlm
          target: ${{ matrix.target }}
          # Version-independent asset name so install.sh can use the
          # `releases/latest/download/` redirect.
          archive: dlm-$target
          tar: unix
          zip: windows
          # Publish a .sha256 next to each archive; the installers verify it
          # before executing anything they downloaded.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # GPU (static-CUDA) builds — x86-64 Linux and Windows. The installers download
  # the `-cuda-static` asset when they detect an NVIDIA GPU. Building needs the
  # CUDA toolkit (nvcc to compile src/gpu/kernels.cu, cudart_static to link) but
  # NO GPU. The runtime is statically embedded, so the binary runs on any machine
  # with just the NVIDIA driver — no CUDA toolkit install required. We ship only
  # this variant (not a dynamic one): it is a strict superset — it also runs where
  # the toolkit is present. Users who specifically want a dynamic build can
  # `cargo install --features cuda-kernels` from source.
  build-cuda-static:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.5.0"
          method: network
          sub-packages: '["nvcc", "cudart"]'
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dlm
          target: ${{ matrix.target }}
          features: cuda-static
          archive: dlm-$target-cuda-static
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Shell completion scripts, generated by the binary itself and attached to the
  # Release. Platform-independent (generated from the CLI definition), so one job.
  completions:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          for sh in bash zsh fish elvish powershell; do
            cargo run --quiet -- completions "$sh" > "dlm.$sh"
          done
      - run: gh release upload "$GITHUB_REF_NAME" dlm.bash dlm.zsh dlm.fish dlm.elvish dlm.powershell --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
