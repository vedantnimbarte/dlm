name: release

# Build prebuilt `dlm` binaries and attach them to the GitHub Release when a
# version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# install.sh downloads these, so users never build from source.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {} # run manually from a tag ref

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so every upload job has a target. Without
  # this the uploads race — `gh release upload` doesn't create a release, and
  # parallel jobs each try to create one — which is how the first tagged run
  # failed with repeated "release not found".
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The tag drives the release, but the binaries' `--version` comes from
      # Cargo.toml. If they disagree, users get a binary whose version doesn't
      # match its release. Fail the release rather than publish the mismatch.
      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi
      # A semver prerelease tag (contains a hyphen, e.g. v1.2.0-rc1) must NOT
      # become GitHub's `latest`, which is what every `curl | sh` install pulls.
      # Mark it --prerelease so `releases/latest/download/` skips it.
      - name: Create release if absent
        run: |
          case "$GITHUB_REF_NAME" in
            *-*) pre=--prerelease ;;
            *)   pre= ;;
          esac
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $pre
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # No Intel-Mac build: GitHub retired the macos-13 (Intel) image in Dec
          # 2025, Intel Macs can't use the CUDA path anyway, and Apple Silicon is
          # covered below. Intel-Mac users build from source (see install.sh).
          - target: aarch64-apple-darwin
            os: macos-14
          # Windows is a first-class target: `dlm` is pure std + a CPU kernel, so
          # it builds natively here. Ships as a .zip (see `zip:` below) and is
          # installed by install.ps1.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds the default (CPU) feature set — runs on any machine with no GPU
      # toolchain.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dlm
          target: ${{ matrix.target }}
          # Version-independent asset name so install.sh can use the
          # `releases/latest/download/` redirect.
          archive: dlm-$target
          tar: unix
          zip: windows
          # Publish a .sha256 next to each archive; the installers verify it
          # before executing anything they downloaded.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # GPU (static-CUDA) builds — x86-64 Linux and Windows. The installers download
  # the `-cuda-static` asset when they detect an NVIDIA GPU. Building needs the
  # CUDA toolkit (nvcc to compile src/gpu/kernels.cu, cudart_static to link) but
  # NO GPU. The runtime is statically embedded, so the binary runs on any machine
  # with just the NVIDIA driver — no CUDA toolkit install required. We ship only
  # this variant (not a dynamic one): it is a strict superset — it also runs where
  # the toolkit is present. Users who specifically want a dynamic build can
  # `cargo install --features cuda-kernels` from source.
  build-cuda-static:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # CUDA 13.2 is the first release whose nvcc frontend supports the runner's
      # MSVC 195x (VS 2026); CUDA 12.5's cudafe++ segfaulted on it and the runners
      # ship only the newest MSVC, so bumping the toolkit is the fix, not pinning an
      # older compiler. Full toolkit (no sub-packages) because CUDA 13 no longer
      # bundles crt/host_config.h in the ["nvcc","cudart"] subset. Linux also needs
      # libstdc++ at link time now — handled in build.rs.
      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"
          method: network
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dlm
          target: ${{ matrix.target }}
          features: cuda-static
          archive: dlm-$target-cuda-static
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Sign every published binary archive with minisign so the installers can
  # prove authenticity (not just integrity). Runs after the archives exist and
  # only when a signing key is configured — releases without the MINISIGN_SECRET_KEY
  # secret still publish, just unsigned, so forks aren't blocked.
  # Setup once: `minisign -G -W -p dlm.pub -s dlm.key` (the -W key has no
  # passphrase, which is what lets CI sign non-interactively). Store dlm.key's
  # contents as the MINISIGN_SECRET_KEY secret and paste dlm.pub's key line into
  # MINISIGN_PUBKEY in install.sh/install.ps1.
  sign:
    needs: [build, build-cuda-static]
    runs-on: ubuntu-latest
    steps:
      - name: Sign release assets
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "MINISIGN_SECRET_KEY not set — publishing release unsigned."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y minisign
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          mkdir dist && cd dist
          gh release download "$GITHUB_REF_NAME" --pattern 'dlm-*' --dir .
          for f in dlm-*; do
            # Sign the archives only, not the checksum or any existing signature.
            case "$f" in *.minisig|*.sha256) continue ;; esac
            minisign -S -s ../minisign.key -m "$f" -x "$f.minisig"
          done
          gh release upload "$GITHUB_REF_NAME" ./*.minisig --clobber
          rm -f ../minisign.key

  # Shell completion scripts, generated by the binary itself and attached to the
  # Release. Platform-independent (generated from the CLI definition), so one job.
  completions:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          for sh in bash zsh fish elvish powershell; do
            cargo run --quiet -- completions "$sh" > "dlm.$sh"
          done
      - run: gh release upload "$GITHUB_REF_NAME" dlm.bash dlm.zsh dlm.fish dlm.elvish dlm.powershell --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
